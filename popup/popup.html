<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Arya Translate</title>
</head>
<body>
  <div class="container">
    <header>
      <h1>Arya Translate</h1>
      <p id="modelSubtitle" class="subtitle">AI Web Translator</p>
    </header>

    <div id="status" class="status hidden"></div>

    <div class="field">
      <label for="modelSelect">Translation Model</label>
      <select id="modelSelect"></select>
    </div>

    <div class="field">
      <label for="targetLang">Target Language</label>
      <select id="targetLang">
        <option value="简体中文">简体中文</option>
        <option value="繁体中文">繁体中文</option>
        <option value="English">English</option>
        <option value="日本語">日本語</option>
        <option value="한국어">한국어</option>
        <option value="Français">Français</option>
        <option value="Deutsch">Deutsch</option>
        <option value="Español">Español</option>
      </select>
    </div>

    <div class="actions">
      <button id="translateBtn" class="btn primary">Translate This Page</button>
      <button id="cancelBtn" class="btn danger hidden">Cancel</button>
      <button id="restoreBtn" class="btn secondary">Restore Original</button>
    </div>

    <p class="speed-tip">Free · AI-powered · No key needed for Qwen-MT</p>

    <div id="paymentBanner" class="payment-banner hidden">
      <span id="paymentBannerText"></span>
      <button type="button" id="upgradeBtn" class="link-btn">Support</button>
    </div>

    <footer>
      <a id="settingsLink" href="#">Settings & API Key</a>
    </footer>
  </div>
  <script src="../shared/models.js"></script>
  <script src="../shared/providers.js"></script>
  <script src="../shared/afdian.js"></script>
  <script src="popup.js"></script>
</body>
</html>
